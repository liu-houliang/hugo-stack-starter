# Global theme parameters / 全局主题参数

[homepage]
    # Set to true to enable 2-column grid layout / 设置为 true 开启首页两栏网格布局
    grid = true

[footer]
    since = 2024
    launchDate = "2024-09-09"

[widgets]
    # homepage = [
    #     { type = "search" },
    #     { type = "archives", params = { limit = 5 } },
    #     { type = "categories", params = { limit = 10 } },
    #     { type = "tag-cloud", params = { limit = 10 } },
    # ]
    page = [{ type = "toc" }]

[colorScheme]
    toggle  = true
    default = "auto"

[comments]
    enabled  = false
    provider = "disqus"
